name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' # 使用 Python 3.11

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          # 初始化 buildozer.spec
          buildozer init

      - name: Build APK
        run: |
          # 运行打包命令，-v 表示显示详细日志
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: GistManager-APK
          path: bin/*.apk此时的文件夹结构应该是这样的：

GistManagerApp/
├── main.py
└── .github/
    └── workflows/
        └── build.yml